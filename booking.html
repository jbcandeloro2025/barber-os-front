<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Studio Rafael — Agendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0F1115;--surface:#1A1D24;--s2:#20242D;--border:#2A2F3A;
    --primary:#F97316;--primary-hover:#EA580C;--primaryBg:rgba(249,115,22,0.1);
    --success:#10B981;--error:#EF4444;--warn:#F59E0B;
    --text:#FFFFFF;--muted:#A3A3A3;--muted2:#525252;
    --accent-gradient: linear-gradient(180deg, #7c120a 0%, #0F1115 100%);
  }
  html,body{height:100%;background:#000;}
  body{font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent;}
  #root{height:100%;display:flex;flex-direction:column;width:100%;background:var(--bg);}
  ::-webkit-scrollbar{width:0px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp 0.3s ease-out both}
  input::placeholder{color:var(--muted2);}
  button:active{transform:scale(0.98);}
  .scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch;}
  
  /* Calendar Styles */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day{aspect-ratio:1;display:flex;alignItems:center;justifyContent:center;borderRadius:8px;fontSize:13px;cursor:pointer;transition:all 0.2s;}
  .cal-day.other{color:var(--muted2);opacity:0.5;}
  .cal-day.active{background:var(--primary);color:#fff;fontWeight:700;}
  .cal-day.today{color:var(--primary);border:1px solid var(--primary);}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px;color:var(--muted);fontSize:11px;fontWeight:600;}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/booking-entry.jsx"></script>
</body>
</html>
